<style>
/* ── Design DNA — §2.1 完整 CSS 变量 ── */
:root {
  /* TopBar（始终保持深色系；bg / accent / muted 随主题微调，见 darkVars / lightVars） */
  --topnav-bg:          #1a1025;   /* Light 默认值 */
  --topnav-accent:      #2d2240;   /* Light 默认值 */
  --topnav-fg:          #f0edf5;
  --topnav-muted:       #8b7fa0;   /* Light 默认值 */
  --topnav-active-bg:   #312870;
  --topnav-active-fg:   #c4bdff;
  --topnav-height:      56px;

  /* Sidebar & Body（Light 默认） */
  --sidebar-bg:         #fafafa;
  --sidebar-border:     #e4e4e7;
  --sidebar-fg:         #09090b;
  --sidebar-muted:      #71717a;
  --sidebar-active-bg:  #e4e4e7;
  --sidebar-active-fg:  #18181b;
  --sidebar-width:      256px;
  --body-bg:            #ffffff;
  --body-radius:        16px 16px 0 0;

  /* 主色 */
  --color-primary:        #5f4ecf;
  --color-primary-hover:  #4a3eb0;
  --color-primary-active: #3d3399;
  --color-primary-subtle: #ece9f9;
  --primary-foreground:   #ffffff;

  /* 中性色 */
  --foreground:           #09090b;
  --background:           #ffffff;
  --card:                 #ffffff;
  --accent:               #f4f4f5;
  --muted:                #f4f4f5;
  --muted-foreground:     #71717a;
  --border:               #e4e4e7;
  --input:                #ffffff;

  /* 状态色 */
  --color-success:        #22c55e;
  --color-warning:        #e6a23c;
  --color-destructive:    #ef4444;

  /* Badge */
  --badge-purple-bg: #f2eef8;  --badge-purple-fg: #6a4e9a;
  --badge-blue-bg:   #eef1f8;  --badge-blue-fg:   #4a6298;
  --badge-green-bg:  #eef5f0;  --badge-green-fg:  #3a7252;
  --badge-orange-bg: #f8f1ec;  --badge-orange-fg: #8a5e38;
  --badge-yellow-bg: #f7f4ea;  --badge-yellow-fg: #7a6228;
  --badge-muted-bg:  var(--muted); --badge-muted-fg: var(--muted-foreground);

  /* 阴影 */
  --shadow-sm:  0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:  0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg:  0 4px 16px rgba(0,0,0,0.12);
  --shadow-xl:  0 8px 32px rgba(0,0,0,0.16);

  /* 圆角 */
  --radius-sm:   4px;
  --radius-md:   6px;
  --radius-lg:   8px;
  --radius-xl:   12px;
  --radius-2xl:  16px;
  --radius-pill: 9999px;

  /* 字体 */
  --font-heading: 'Manrope Variable', Inter, system-ui, sans-serif;
  --font-base:    'Inter Variable', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono:    'IBM Plex Mono', 'SF Mono', Consolas, monospace;

  /* 动效 */
  --duration-fast: 150ms;   /* hover / focus / state */
  --duration-base: 250ms;   /* card hover / tooltip */
  --duration-slow: 400ms;   /* drawer / dialog */
  --ease-out: cubic-bezier(0.4, 0, 0.2, 1);

  /* Avatar */
  --avatar-bg: #7c3aed;

  /* 状态色 Subtle */
  --color-success-subtle:      #ecfdf5;
  --color-warning-subtle:      #fef3c7;
  --color-destructive-subtle:  #fef2f2;

  /* Focus ring */
  --ring: #18181b;

  /* Spacing 间距（4px 基准网格，语义命名） */
  --space-xs:   4px;    /* 图标与文字间距、Badge 内边距 */
  --space-sm:   8px;    /* 行内元素间距、组件 gap */
  --space-md:   12px;   /* 组件内边距（紧凑）、按钮组 gap */
  --space-base: 16px;   /* 表格列内边距、表单行间距 */
  --space-lg:   20px;   /* 卡片内边距 */
  --space-xl:   24px;   /* 主内容区内边距、Section 间距 */
  --space-2xl:  32px;   /* 大区块间距 */
  --space-3xl:  48px;   /* 页面顶部空白 */

  /* Z-index 层级 */
  --z-base:     1;
  --z-dropdown: 350;
  --z-sticky:   200;
  --z-fixed:    300;
  --z-overlay:  400;
  --z-modal:    500;
  --z-popover:  600;
  --z-toast:    700;
  --z-tooltip:  800;
  --z-message:  900;

  /* Icon sizes 图标尺寸 */
  --icon-xs:   12px;
  --icon-sm:   14px;
  --icon-md:   16px;
  --icon-lg:   18px;
  --icon-xl:   20px;
  --icon-2xl:  24px;
  --icon-3xl:  32px;

  /* Element Plus 兼容 */
  --el-border-radius-base:     6px;
  --el-border-color:           var(--border);
  --el-bg-color:               var(--background);
  --el-bg-color-page:          var(--accent);
  --el-bg-color-overlay:       #ffffff;
  --el-text-color-primary:     var(--foreground);
  --el-text-color-regular:     var(--muted-foreground);
  --el-text-color-secondary:   var(--muted-foreground);
  --el-text-color-placeholder: #a1a1aa;
  --el-fill-color-blank:       var(--input);
  --el-fill-color-light:       var(--accent);
  --el-fill-color:             #f0f0f0;
  --el-color-primary:          var(--color-primary);
  --el-disabled-bg-color:      #f5f5f5;
  --el-disabled-border-color:  #e4e4e7;
  --el-mask-color:             rgba(255,255,255,0.9);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ── App Shell — §3.1 ── */
html, body {
  height: 100%;
  background: var(--topnav-bg);
  font-family: var(--font-base);
  -webkit-font-smoothing: antialiased;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.body {
  display: flex;
  flex: 1;
  overflow: hidden;
  border-radius: var(--body-radius);
  background: var(--body-bg);
}

.main {
  flex: 1;
  overflow: auto;
  background: var(--body-bg);
}

/* ── TopBar — §3.2 ── */
.topnav {
  height: var(--topnav-height);
  min-height: var(--topnav-height);
  background: var(--topnav-bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  gap: 8px;
  z-index: var(--z-topbar, 100);
}
.topnav-left  { display: flex; align-items: center; gap: 12px; min-width: 0; }
.topnav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.nav-logo {
  height: 28px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.nav-logo img { height: 28px; width: auto; display: block; }

.nav-divider { width: 1px; height: 20px; background: var(--topnav-accent); flex-shrink: 0; }

.nav-tabs { display: flex; align-items: center; gap: 4px; }

.nav-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px; font-weight: 600;
  color: var(--topnav-muted);
  white-space: nowrap;
  transition: background var(--duration-fast), color var(--duration-fast);
}
.nav-tab.active { background: var(--topnav-active-bg); color: var(--topnav-active-fg); }
.nav-tab:not(.active):hover { background: rgba(255,255,255,0.06); color: var(--topnav-fg); }

.nav-icon-btn {
  width: 30px; height: 30px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--topnav-muted);
  transition: background var(--duration-fast), color var(--duration-fast);
  flex-shrink: 0;
}
.nav-icon-btn:hover { background: var(--topnav-accent); color: var(--topnav-fg); }
.language-picker { position: relative; }
.language-menu { position: absolute; right: 0; top: calc(100% + 8px); z-index: var(--z-dropdown); min-width: 132px; padding: 6px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); box-shadow: var(--shadow-lg); }
.language-option { width: 100%; display: flex; align-items: center; justify-content: space-between; min-height: 34px; padding: 0 10px; border: 0; border-radius: 8px; background: transparent; color: var(--foreground); font-size: 13px; font-weight: 600; text-align: left; }
.language-option:hover, .language-option.active { color: var(--color-primary); background: var(--color-primary-subtle); }
.nav-icon-btn [data-lucide] { width: 16px; height: 16px; }

/* ── Stage（shell-only 空舞台） ── */
.stage-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}
.stage-card {
  max-width: 480px; width: 100%;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.stage-chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 12px;
  border-radius: var(--radius-pill);
  background: var(--color-primary-subtle);
  color: var(--color-primary);
  font-size: 12px; font-weight: 600;
}
.stage-title {
  font-family: var(--font-heading);
  font-size: 26px; font-weight: 800;
  color: var(--foreground); line-height: 1.2;
}
.stage-desc {
  font-size: 14px; line-height: 1.7;
  color: var(--muted-foreground);
}
.stage-badges {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-top: 4px;
}
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  height: 22px; padding: 3px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 500; letter-spacing: 0.2px;
}
.badge-green  { background: var(--badge-green-bg);  color: var(--badge-green-fg); }
.badge-blue   { background: var(--badge-blue-bg);   color: var(--badge-blue-fg); }
.badge-purple { background: var(--badge-purple-bg); color: var(--badge-purple-fg); }
.badge-orange { background: var(--badge-orange-bg); color: var(--badge-orange-fg); }


/* VRAM Calculator business surface */
.calculator-page { min-height: 100%; padding: var(--space-xl); color: var(--foreground); background: var(--body-bg); }
.calculator-topline { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-lg); margin-bottom: var(--space-base); }
.page-kicker { display: inline-flex; align-items: center; gap: var(--space-xs); color: var(--color-primary); font-size: 12px; font-weight: 700; letter-spacing: 0; text-transform: uppercase; }
.page-title { margin: var(--space-xs) 0 0; font-family: var(--font-heading); font-size: 28px; line-height: 1.2; font-weight: 800; color: var(--foreground); letter-spacing: 0; }
.disclaimer-strip { display: inline-flex; align-items: center; width: fit-content; max-width: 100%; min-width: 0; margin-bottom: var(--space-lg); padding: var(--space-sm) var(--space-base); border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--color-primary-subtle); color: var(--foreground); box-shadow: var(--shadow-sm); }
.disclaimer-strip-text { min-width: 0; flex: 0 1 auto; color: var(--foreground); font-size: 12px; line-height: 1.55; overflow-wrap: anywhere; }
.disclaimer-strip-text strong { color: var(--color-primary); font-weight: 800; }
.disclaimer-action { min-width: 24px; min-height: 24px; width: 24px; height: 24px; margin-left: var(--space-sm); padding: 0; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; border: 1px solid var(--color-primary); border-radius: var(--radius-pill); background: var(--card); color: var(--color-primary); font-size: 13px; font-weight: 900; line-height: 1; box-shadow: none; vertical-align: middle; }
.disclaimer-action:hover { background: var(--color-primary); color: var(--primary-foreground); }
.calculator-hero { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: var(--space-xl); align-items: center; padding: var(--space-lg); border: 1px solid var(--border); border-radius: var(--radius-xl); background: var(--card); box-shadow: var(--shadow-sm); }
.calculator-hero p { max-width: 920px; color: var(--muted-foreground); line-height: 1.7; font-size: 14px; }
.hero-summary { display: grid; gap: var(--space-sm); min-width: 180px; padding: var(--space-base); border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--accent); }
.hero-summary span { color: var(--muted-foreground); font-size: 12px; font-weight: 600; }
.hero-summary strong { font-family: var(--font-heading); font-size: 22px; color: var(--foreground); }
.pill-row { display: flex; flex-wrap: wrap; gap: var(--space-sm); margin-top: var(--space-base); }
.pill { display: inline-flex; align-items: center; gap: var(--space-xs); min-height: 28px; padding: var(--space-xs) var(--space-md); border-radius: var(--radius-pill); border: 1px solid var(--border); background: var(--accent); color: var(--muted-foreground); font-size: 12px; }
.pill strong { color: var(--foreground); }
.calculator-layout { display: grid; grid-template-columns: minmax(420px, 480px) minmax(0, 1fr); gap: var(--space-lg); margin-top: var(--space-lg); align-items: start; }
.planner-panel, .result-card, .note-card, .section-panel { min-width: 0; border: 1px solid var(--border); border-radius: var(--radius-xl); background: var(--card); box-shadow: var(--shadow-sm); }
.planner-panel { padding: var(--space-lg); position: sticky; top: var(--space-lg); }
.result-card { padding: var(--space-lg); }
.note-card { padding: var(--space-base); margin-top: var(--space-base); }
.result-header { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-base); margin-bottom: var(--space-base); }
.result-title { display: grid; gap: var(--space-xs); }
.result-title h2 { margin: 0; font-family: var(--font-heading); font-size: 18px; font-weight: 800; color: var(--foreground); }
.result-title p { margin: 0; color: var(--muted-foreground); font-size: 12px; line-height: 1.5; }
.form-grid, .primary-fields, .advanced-body { display: grid; gap: var(--space-base); min-width: 0; }
.field { min-width: 0; }
.field label, .bar-item label { display: flex; flex-wrap: wrap; align-items: flex-start; gap: var(--space-xs) var(--space-sm); margin-bottom: var(--space-sm); color: var(--foreground); font-size: 13px; font-weight: 600; }
.field label > span:first-child, .bar-item label > span:first-child { min-width: 0; flex: 0 1 auto; }
.hint, .muted { color: var(--muted-foreground); font-size: 12px; font-weight: 400; }
.field label .hint, .bar-item label .hint { min-width: 0; max-width: 100%; flex: 1 1 160px; text-align: right; white-space: normal; overflow-wrap: anywhere; word-break: break-word; line-height: 1.35; }
.label-text { display: inline-flex; align-items: center; gap: var(--space-xs); min-width: 0; }
.info-tip { position: relative; display: inline-flex; align-items: center; justify-content: center; width: var(--icon-md); height: var(--icon-md); border-radius: var(--radius-pill); border: 1px solid var(--color-primary); color: var(--color-primary); font-size: 11px; line-height: 1; cursor: help; flex: 0 0 auto; }
.info-tip::after { content: attr(data-tip); position: absolute; left: 50%; bottom: calc(100% + var(--space-sm)); transform: translateX(-50%); width: min(280px, 72vw); padding: var(--space-sm) var(--space-md); border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--card); color: var(--foreground); box-shadow: var(--shadow-lg); font-size: 12px; font-weight: 400; line-height: 1.55; white-space: normal; overflow-wrap: anywhere; opacity: 0; pointer-events: none; z-index: var(--z-tooltip); transition: opacity var(--duration-fast); }
.info-tip:hover::after, .info-tip:focus-visible::after { opacity: 1; }
input, select { width: 100%; min-width: 0; max-width: 100%; min-height: 40px; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-sm) var(--space-md); background: var(--input); color: var(--foreground); outline: none; font-size: 14px; transition: border-color var(--duration-fast), box-shadow var(--duration-fast); }
select { appearance: none; padding-right: var(--space-3xl); text-overflow: ellipsis; background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2371717a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='m6 9 6 6 6-6'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 16px center; background-size: var(--icon-md) var(--icon-md); }
input:focus, select:focus { border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-subtle); }
#concurrency, #contextTokens, #reserve { padding-left: 5px; padding-right: 5px; }
select option, select optgroup { background: var(--card); color: var(--foreground); }
select option:disabled { color: var(--muted-foreground); background: var(--accent); }
.native-select-hidden { display: none; }
.gpu-picker, .model-picker { position: relative; min-width: 0; max-width: 100%; }
.gpu-picker-trigger, .model-picker-trigger { position: relative; width: 100%; min-width: 0; max-width: 100%; min-height: 40px; display: flex; align-items: center; gap: var(--space-sm); padding: var(--space-sm) var(--space-3xl) var(--space-sm) var(--space-md); border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--input); color: var(--foreground); font-size: 14px; font-weight: 500; text-align: left; }
.gpu-picker-trigger:hover, .model-picker-trigger:hover { color: var(--foreground); border-color: var(--color-primary); background: var(--input); }
.gpu-picker-trigger:focus-visible, .model-picker-trigger:focus-visible { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-subtle); }
.gpu-picker-trigger span, .model-picker-trigger span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gpu-picker-trigger [data-lucide], .model-picker-trigger [data-lucide] { position: absolute; right: var(--space-base); top: 50%; width: var(--icon-md); height: var(--icon-md); flex: 0 0 auto; color: var(--muted-foreground); transform: translateY(-50%); transition: transform var(--duration-fast) var(--ease-out); }
.gpu-picker.is-open .gpu-picker-trigger [data-lucide], .model-picker.is-open .model-picker-trigger [data-lucide] { transform: translateY(-50%) rotate(180deg); }
.gpu-picker-menu, .model-picker-menu, .searchable-select-menu { position: absolute; left: 0; right: 0; top: calc(100% + var(--space-xs)); z-index: var(--z-dropdown); display: none; max-height: 340px; overflow: auto; padding: var(--space-xs); border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--card); box-shadow: var(--shadow-lg); }
.gpu-picker.is-open .gpu-picker-menu, .model-picker.is-open .model-picker-menu, .searchable-select.is-open .searchable-select-menu { display: block; }
.picker-search { position: sticky; top: 0; z-index: calc(var(--z-raised) + 1); margin-bottom: var(--space-xs); padding: var(--space-xs); background: var(--card); }
.picker-search input { min-height: 36px; }
.gpu-option-group { position: sticky; top: 48px; z-index: var(--z-raised); display: flex; align-items: center; min-height: 28px; margin: var(--space-sm) 0 var(--space-xs); padding: 0 var(--space-md); border-left: 3px solid var(--color-primary); border-radius: var(--radius-md); background: var(--color-primary-subtle); color: var(--color-primary); font-size: 12px; font-weight: 800; letter-spacing: 0; }
.gpu-option-group:first-child { margin-top: 0; }
.gpu-option, .searchable-select-option { width: 100%; min-height: 40px; display: flex; align-items: center; padding: var(--space-sm) var(--space-md); border: 0; border-radius: var(--radius-md); background: transparent; color: var(--foreground); text-align: left; box-shadow: none; }
.gpu-option:hover, .gpu-option.is-selected, .searchable-select-option:hover, .searchable-select-option.is-selected { color: var(--color-primary); background: var(--color-primary-subtle); }
.searchable-select-option:disabled, .searchable-select-option:disabled:hover { color: var(--muted-foreground); background: var(--accent); cursor: not-allowed; opacity: 0.62; }
.searchable-select-option:disabled span { color: var(--muted-foreground); text-decoration: line-through; }
.gpu-option span, .searchable-select-option span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; font-weight: 600; }
.gpu-option small { color: var(--muted-foreground); font-size: 11px; font-weight: 500; }
.gpu-option.is-selected small { color: var(--color-primary); }

const app = createApp({
  setup() {
    const isDark    = ref(false);
    const initialLang = 'en';
    const lang      = ref(initialLang);
    const languageMenuOpen = ref(false);
    document.documentElement.lang = initialLang === 'zh' ? 'zh-CN' : 'en';
    const activeTab = ref(0);
    const activeNav = ref('vramCalculator');
    const t = computed(() => i18n[lang.value]);

    function toggleTheme() {
      isDark.value = !isDark.value;
      const vars = isDark.value ? darkVars : lightVars;
      Object.entries(vars).forEach(([k, v]) =>
        document.documentElement.style.setProperty(k, v)
      );
      nextTick(() => lucide.createIcons());
    }

    function setLang(nextLang) {
      lang.value = nextLang === 'zh' ? 'zh' : 'en';
      languageMenuOpen.value = false;
      document.documentElement.lang = lang.value === 'zh' ? 'zh-CN' : 'en';
      if (window.setCalculatorLang) window.setCalculatorLang(lang.value);
    }

    function toggleLang() {
      languageMenuOpen.value = !languageMenuOpen.value;
    }

    const logoSrc = computed(() => isDark.value ? LOGO_DARK : LOGO_DARK);
    nextTick(() => {
      if (window.setCalculatorLang) window.setCalculatorLang(lang.value);
    });

    return { isDark, lang, languageMenuOpen, activeTab, activeNav, t, toggleTheme, toggleLang, setLang, logoSrc };

          optionButton.type = 'button';
          optionButton.className = 'gpu-option';
          optionButton.dataset.modelName = model.name;
          optionButton.dataset.searchText = `${group.group} ${model.name}`.toLowerCase();

          optionButton.appendChild(name);
          optionButton.addEventListener('click', () => setModelValue(model.name));

        });
      });

        groupLabel.className = 'gpu-option-group';
        groupLabel.textContent = gpuGroupLabel(group);
        els.gpuPickerOptions.appendChild(groupLabel);

        group.items.forEach(gpu => {
          const optionButton = document.createElement('button');
          optionButton.type = 'button';
          optionButton.className = 'gpu-option';
          optionButton.dataset.gpuName = gpu.name;
          optionButton.dataset.searchText = `${group.group} ${group.groupZh || ''} ${group.groupEn || ''} ${gpuDisplayText(gpu)} ${gpuLocalizedField(gpu, 'supportedQuantizationBits')} ${gpuLocalizedField(gpu, 'vllmKvCacheFp8Support')}`.toLowerCase();
          optionButton.setAttribute('role', 'option');

          const name = document.createElement('span');
          name.textContent = gpuDisplayText(gpu);

          optionButton.appendChild(name);
          optionButton.addEventListener('click', () => setGpuValue(gpu.name));
          els.gpuPickerOptions.appendChild(optionButton);
        });
      });
    }

    function syncGpuPicker() {
      const gpu = getGpu(els.gpu.value);
      if (els.gpuPickerLabel) els.gpuPickerLabel.textContent = gpu ? gpuDisplayText(gpu) : '';
      if (!els.gpuPickerOptions) return;
      els.gpuPickerOptions.querySelectorAll('.gpu-option').forEach(option => {
        const selected = option.dataset.gpuName === els.gpu.value;
        option.classList.toggle('is-selected', selected);
        option.setAttribute('aria-selected', selected ? 'true' : 'false');
      });
    }

    function closeGpuPicker() {
      if (!els.gpuPicker) return;
      els.gpuPicker.classList.remove('is-open');
      els.gpuPickerTrigger?.setAttribute('aria-expanded', 'false');
    }

    function toggleGpuPicker() {
      if (!els.gpuPicker) return;
      const isOpen = els.gpuPicker.classList.toggle('is-open');
      els.gpuPickerTrigger?.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      if (isOpen) {
        closeModelPicker();
        closeSearchableSelects();
        filterPickerOptions(els.gpuPickerOptions, els.gpuPickerSearch, els.gpuPickerEmpty);
        requestAnimationFrame(() => els.gpuPickerSearch?.focus());
      }
    }

    function setGpuValue(gpuName) {
      els.gpu.value = gpuName;
      syncGpuPicker();
      closeGpuPicker();
      syncQuantAvailability();
      syncKvDtypeAvailability();
      calculate();
    }

    function gpuSupportsQuant(gpu, quantKey) {
      const requiredBit = quantSupportRequirements[quantKey];
      return !!gpu?.supportedQuantization?.[requiredBit];
    }

    function firstSupportedQuantKey(gpu) {
      return Object.keys(quantSettings).find(key => gpuSupportsQuant(gpu, key)) || 'none';
    }

    function quantUnsupportedText(bit) {
      return calculatorLang === 'en'
        ? `Requires ${bit}-bit support on the selected accelerator card`
        : `当前加速卡不支持 ${bit}-bit 策略`;
    }

    function syncQuantAvailability(gpu = getGpu(els.gpu.value)) {
      if (!els.quant || !gpu) return;
      Array.from(els.quant.options).forEach(option => {
        const bit = quantSupportRequirements[option.value];
        const supported = gpuSupportsQuant(gpu, option.value);
        option.disabled = !supported;
        option.title = supported ? gpuLocalizedField(gpu, 'supportedQuantizationBits') : quantUnsupportedText(bit);
      });
      if (!gpuSupportsQuant(gpu, els.quant.value)) els.quant.value = firstSupportedQuantKey(gpu);
      els.quant._syncSearchableSelect?.();
    }

    function syncContextTokensToModel() {
      const model = getModel(els.model.value);
      if (!model) return;
      const modelContext = Number(model.context) || 4096;
      els.contextTokens.value = modelContext;
      els.contextTokens.max = modelContext;
      els.contextTokens.title = calculatorLang === 'en'
        ? `Model default max context: ${modelContext.toLocaleString()} tokens`
        : `模型默认最大上下文：${modelContext.toLocaleString()} tokens`;
    }

    function syncKvDtypeAvailability(gpu = getGpu(els.gpu.value)) {
      const fp8Option = Array.from(els.kvDtype.options).find(option => option.value === '1');
      if (!fp8Option || !gpu) return;
      const supported = !!gpu.vllmKvCacheFp8Supported;
      fp8Option.disabled = !supported;
      fp8Option.textContent = supported
        ? 'FP8'
        : calculatorLang === 'en' ? 'FP8 (not supported by selected accelerator card)' : 'FP8（当前加速卡不支持）';
      fp8Option.title = gpuLocalizedField(gpu, 'vllmKvCacheFp8Support');
      if (!supported && els.kvDtype.value === '1') els.kvDtype.value = '2';
      els.kvDtype._syncSearchableSelect?.();
    }

    function filterPickerOptions(optionsWrap, searchInput, emptyEl) {
      if (!optionsWrap) return;
      const query = (searchInput?.value || '').trim().toLowerCase();
      let visibleCount = 0;
      let currentGroup = null;
      let currentGroupVisible = 0;
      const flushGroup = () => {
        if (currentGroup) currentGroup.hidden = currentGroupVisible === 0;
      };

      Array.from(optionsWrap.children).forEach(child => {
        if (child.classList.contains('gpu-option-group')) {
          flushGroup();
          currentGroup = child;
          currentGroupVisible = 0;
          return;
        }
        const matched = !query || (child.dataset.searchText || child.textContent || '').toLowerCase().includes(query);
        child.hidden = !matched;
        if (matched) {
          visibleCount += 1;
          currentGroupVisible += 1;
        }
      });
      flushGroup();
      if (emptyEl) emptyEl.style.display = visibleCount ? 'none' : 'block';
    }

    function closeSearchableSelects(except) {
      document.querySelectorAll('.searchable-select.is-open').forEach(wrapper => {
        if (wrapper === except) return;
        wrapper.classList.remove('is-open');
        wrapper.querySelector('.searchable-select-trigger')?.setAttribute('aria-expanded', 'false');
      });
    }

    function enhanceSearchableSelect(select) {
      if (!select || select.classList.contains('native-select-hidden')) return;
      select.classList.add('native-select-hidden');
      select.setAttribute('aria-hidden', 'true');
      select.tabIndex = -1;

      const wrapper = document.createElement('div');
      wrapper.className = 'searchable-select';
      const trigger = document.createElement('button');
      trigger.type = 'button';
      trigger.className = 'searchable-select-trigger';
      trigger.setAttribute('aria-haspopup', 'listbox');
      trigger.setAttribute('aria-expanded', 'false');
      const label = document.createElement('span');
      const icon = document.createElement('i');
      icon.dataset.lucide = 'chevron-down';
      trigger.append(label, icon);

      const menu = document.createElement('div');
      menu.className = 'searchable-select-menu';
      menu.setAttribute('role', 'listbox');
      const searchWrap = document.createElement('div');
      searchWrap.className = 'picker-search';
      const search = document.createElement('input');
      search.type = 'search';
      search.autocomplete = 'off';
      search.placeholder = tCalc('genericSearchPlaceholder');
      searchWrap.appendChild(search);
      const optionsWrap = document.createElement('div');
      const empty = document.createElement('div');
      empty.className = 'picker-empty';
      empty.textContent = tCalc('emptyResult');
      menu.append(searchWrap, optionsWrap, empty);
      wrapper.append(trigger, menu);
      select.after(wrapper);

      const syncLabel = () => {
        const selected = select.selectedOptions[0];
        label.textContent = selected ? selected.textContent : '';
      };
      const buildOptions = () => {
        optionsWrap.innerHTML = '';
        Array.from(select.options).forEach(option => {
          const optionButton = document.createElement('button');
          optionButton.type = 'button';
          optionButton.className = 'searchable-select-option';
          optionButton.dataset.value = option.value;
          optionButton.dataset.searchText = `${option.textContent} ${option.value}`.toLowerCase();
          optionButton.disabled = option.disabled;
          optionButton.title = option.title || '';
          optionButton.setAttribute('aria-disabled', option.disabled ? 'true' : 'false');
          optionButton.setAttribute('role', 'option');
          const optionLabel = document.createElement('span');
          optionLabel.textContent = option.textContent;
          optionButton.appendChild(optionLabel);
          optionButton.addEventListener('click', () => {
            if (option.disabled) return;
            select.value = option.value;
            select.dispatchEvent(new Event('input', { bubbles: true }));
            wrapper.classList.remove('is-open');
            trigger.setAttribute('aria-expanded', 'false');
          });
          optionsWrap.appendChild(optionButton);
        });
      };
      const syncSelection = () => {
        search.placeholder = tCalc('genericSearchPlaceholder');
        empty.textContent = tCalc('emptyResult');
        buildOptions();
        syncLabel();
        optionsWrap.querySelectorAll('.searchable-select-option').forEach(option => {
          const selected = option.dataset.value === select.value;
          option.classList.toggle('is-selected', selected);
          option.setAttribute('aria-selected', selected ? 'true' : 'false');
        });
      };

      buildOptions();
      syncSelection();
      trigger.addEventListener('click', () => {
        const isOpen = wrapper.classList.toggle('is-open');
        trigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        if (isOpen) {
          closeModelPicker();
          closeGpuPicker();
          closeSearchableSelects(wrapper);
          search.value = '';
          filterPickerOptions(optionsWrap, search, empty);
          requestAnimationFrame(() => search.focus());
        }
      });
      search.addEventListener('input', () => filterPickerOptions(optionsWrap, search, empty));
      search.addEventListener('click', event => event.stopPropagation());
      select._syncSearchableSelect = syncSelection;
      select.addEventListener('input', () => {
        syncSelection();
        if (window.lucide) lucide.createIcons();
      });
    }

    function initSearchableSelects() {
      document.querySelectorAll('select').forEach(enhanceSearchableSelect);
    }

    function getModel(name) {
      return modelCatalog.flatMap(group => group.models).find(model => model.name === name);
    }

    function getGpu(name) {
      return gpuCatalog.flatMap(group => group.items).find(gpu => gpu.name === name);
    }

    function gb(bytes) {
      return bytes / 1024 / 1024 / 1024;
    }

    function fmt(value, suffix = 'GB') {
      if (!Number.isFinite(value)) return '-';
      if (value >= 1000) return `${Math.round(value).toLocaleString()} ${suffix}`;
      if (value >= 100) return `${value.toFixed(0)} ${suffix}`;
      if (value >= 10) return `${value.toFixed(1)} ${suffix}`;
      return `${value.toFixed(2)} ${suffix}`;
    }

    function formatMemoryAuto(valueGb) {
      if (!Number.isFinite(valueGb)) return '-';
      if (Math.abs(valueGb) >= 1) return fmt(valueGb);
      const valueMb = valueGb * 1024;
      if (Math.abs(valueMb) >= 1) {
        if (valueMb >= 100) return `${valueMb.toFixed(0)} MB`;
        if (valueMb >= 10) return `${valueMb.toFixed(1)} MB`;
        return `${valueMb.toFixed(2)} MB`;
      }
      const valueKb = valueMb * 1024;
      if (valueKb >= 100) return `${valueKb.toFixed(0)} KB`;
      if (valueKb >= 10) return `${valueKb.toFixed(1)} KB`;
      return `${valueKb.toFixed(2)} KB`;
    }

    function fmtModelB(value) {
      if (!Number.isFinite(value)) return '-';
      if (value >= 1000) return `${(value / 1000).toFixed(value % 1000 === 0 ? 0 : 2)}T`;
      if (value < 1) return `${(value * 1000).toFixed(0)}M`;
      return `${value.toLocaleString()}B`;
    }

    function fmtInt(value) {
      if (!Number.isFinite(value)) return '-';
      return Math.max(0, Math.floor(value)).toLocaleString();
    }

    function fmtConcurrency(value) {
      if (value === Infinity) return '不受 KV 限制';
      return fmtInt(value);
    }

    function getYamlDtypeBytes(model) {
      return Math.max(0.0001, model.kv?.dtypeBytes || 2);
    }

    function getRuntimeDtypeBytes(inputs) {
      return Number(inputs.kvBytes) || getYamlDtypeBytes(inputs.model);
    }

    function getRuntimeKvPerTokenBytes(inputs) {
      if ((inputs.model.kv?.mechanism || '') === 'none') return 0;
      return inputs.model.kvBytesPerToken * (getRuntimeDtypeBytes(inputs) / getYamlDtypeBytes(inputs.model));
    }

    function getSlidingWindow(model) {
      return model.kv?.localAttention?.slidingWindow
        || model.kv?.local_attention?.sliding_window
        || model.kv?.calculationParameters?.local_attention?.sliding_window
        || model.kv?.calculationParameters?.localAttention?.slidingWindow
        || null;
    }

    function isVlOrOcrModel(model) {
      return /vl|vision|visual|ocr|视觉|图像|文档/i.test(`${model.type} ${model.name} ${model.series} ${model.architecture} ${model.description}`);
    }

    function getModelKind(model) {
      if (model.type === 'embedding') return 'embedding';
      if (model.type === 'reranker') return 'reranker';
      if (/ocr|文档/i.test(`${model.type} ${model.name} ${model.series} ${model.architecture} ${model.description}`)) return 'ocr';
      if (isVlOrOcrModel(model)) return 'vision_language';
      return 'text_generation';
    }

    function getCacheDemand(inputs) {
      const mechanism = inputs.model.kv?.mechanism || 'gqa';
      const runtimeKvPerTokenBytes = getRuntimeKvPerTokenBytes(inputs);
      const linearStateBytesPerSequence = mechanism === 'hybrid_gqa_linear'
        ? (inputs.model.linearStateBytesPerSequence || 0)
        : 0;
      const rawSeqTokens = inputs.tokensPerRequest;
      const slidingWindow = mechanism === 'mqa_sliding_window' ? getSlidingWindow(inputs.model) : null;
      const effectiveSeqTokens = slidingWindow ? Math.min(rawSeqTokens, slidingWindow) : rawSeqTokens;
      const tokenBytesPerSequence = mechanism === 'none'
        ? 0
        : runtimeKvPerTokenBytes * effectiveSeqTokens;
      const stateBytesPerSequence = mechanism === 'none' ? 0 : linearStateBytesPerSequence;
      const tokenBytesTotal = tokenBytesPerSequence * inputs.concurrency;
      const stateBytesTotal = stateBytesPerSequence * inputs.concurrency;
      return {
        mechanism,
        rawSeqTokens,
        effectiveSeqTokens,
        slidingWindow,
        runtimeKvPerTokenBytes,
        linearStateBytesPerSequence,
        tokenBytesPerSequence,
        stateBytesPerSequence,
        perSequenceBytes: tokenBytesPerSequence + stateBytesPerSequence,
        tokenBytesTotal,
        stateBytesTotal,
        totalBytes: tokenBytesTotal + stateBytesTotal,
        requestedTokens: inputs.concurrency * rawSeqTokens,
        effectiveResidentTokens: inputs.concurrency * effectiveSeqTokens,
      };
    }

    function getFrameworkProfile(model) {
      const kind = getModelKind(model);
      if (kind === 'embedding') return { kind, label: 'Embedding 模型', floorGb: 1.0, rateMin: 0.03, rateMax: 0.04 };
      if (kind === 'reranker') return { kind, label: 'Reranker / Cross-Encoder 模型', floorGb: 1.0, rateMin: 0.03, rateMax: 0.05 };
      if (kind === 'vision_language') return { kind, label: '图文多模态模型', floorGb: 3.0, rateMin: 0.05, rateMax: 0.08 };
      if (kind === 'ocr') return { kind, label: 'OCR / 文档理解模型', floorGb: 3.0, rateMin: 0.05, rateMax: 0.10 };
      return { kind, label: '文本生成模型', floorGb: 1.5, rateMin: 0.04, rateMax: 0.06 };
    }

    function getTypeReserve(model, weightTotalGb) {
      const profile = getFrameworkProfile(model);
      const chosenGb = Math.max(profile.floorGb, weightTotalGb * profile.rateMin);
      return {
        ...profile,
        totalGb: chosenGb,
        chosenGb,
      };
    }

    function getServerCount(gpuCount) {
      return Math.max(1, Math.ceil(gpuCount / 8));
    }

    function calcForGpuCount(inputs, gpuCount) {
      const effectivePerGpu = inputs.gpu.vram * (1 - inputs.reserveRatio);
      const totalEffective = effectivePerGpu * gpuCount;
      const weightTotalGb = inputs.model.totalB * inputs.quant.bytes * inputs.quant.overhead;
      const typeReserve = getTypeReserve(inputs.model, weightTotalGb);
      const frameworkRate = typeReserve.rateMin;
      const frameworkBaseGb = typeReserve.totalGb;
      const cacheDemand = getCacheDemand(inputs);
      const frameworkExtraGb = frameworkBaseGb;
      const vlExtraGb = 0;
      const activeHintGb = inputs.model.activeB * 2;
      const kvTotalGb = gb(cacheDemand.totalBytes);
      const requiredGb = weightTotalGb + kvTotalGb + frameworkExtraGb + vlExtraGb;
      const requiredPerGpuGb = requiredGb / gpuCount;
      const kvCapacityBytes = Math.max(0, totalEffective - weightTotalGb - frameworkExtraGb - vlExtraGb) * 1024 * 1024 * 1024;
      const supportedConcurrency = cacheDemand.perSequenceBytes > 0
        ? kvCapacityBytes / cacheDemand.perSequenceBytes
        : Infinity;
      const supportedTokens = Number.isFinite(supportedConcurrency)
        ? supportedConcurrency * cacheDemand.effectiveSeqTokens
        : Infinity;
      return {
        gpuCount,
        effectivePerGpu,
        totalEffective,
        weightTotalGb,
        frameworkExtraGb,
        frameworkBaseGb,
        frameworkRate,
        vlExtraGb,
        typeReserve,
        activeHintGb,
        kvTotalGb,
        linearStateGb: gb(cacheDemand.stateBytesTotal),
        requiredGb,
        requiredPerGpuGb,
        kvPerTokenGb: gb(cacheDemand.runtimeKvPerTokenBytes),
        kvPerTokenBytes: cacheDemand.runtimeKvPerTokenBytes,
        requestedTokens: cacheDemand.requestedTokens,
        effectiveResidentTokens: cacheDemand.effectiveResidentTokens,
        cacheDemand,
        supportedTokens,
        supportedConcurrency,
        ok: requiredGb <= totalEffective,
      };
    }

    function calculate() {
      if (els.framework.value === 'sglang') els.framework.value = 'vllm';
      const model = getModel(els.model.value);
      const gpu = getGpu(els.gpu.value);
      syncQuantAvailability(gpu);
      syncKvDtypeAvailability(gpu);
      const quant = quantSettings[els.quant.value];
      const framework = frameworkSettings[els.framework.value];
      const inputs = {
        model,
        gpu,
        quant,
        framework,
        concurrency: Math.max(1, Number(els.concurrency.value) || 1),
        reserveRatio: Math.min(0.45, Math.max(0.05, (Number(els.reserve.value) || 15) / 100)),
        tokensPerRequest: Math.max(1, Number(els.contextTokens.value) || 1),
        kvBytes: Number(els.kvDtype.value) || 2,
      };

      let result = null;
      for (let count = 1; ; count += 1) {
        const candidate = calcForGpuCount(inputs, count);
        if (candidate.ok && candidate.supportedConcurrency >= inputs.concurrency * 0.995) {
          result = candidate;
          break;
        }
      }

      currentInputs = inputs;
      currentResult = result;
      render(inputs, result);
    }

    function formatPerfEntry(label, entry) {
      const value = Number(entry?.tflops);
      if (!Number.isFinite(value) || value <= 0) return '';
      return `${label} ${value.toLocaleString(undefined, { maximumFractionDigits: 1 })} TFLOPS`;
    }

    function getPerfRows(gpu) {
      const perf = gpu.precisionTflops || {};
      return [
        ['FP32', perf.fp32],
        ['TF32', perf.tf32],
        ['FP16', perf.fp16],
        ['BF16', perf.bf16],
        ['FP8', perf.fp8],
        ['FP4', perf.fp4],
        ['INT8', perf.int8],
      ].map(([label, entry]) => {
        const value = Number(entry?.tflops);
        if (!Number.isFinite(value) || value <= 0) return null;
        return [label, `${value.toLocaleString(undefined, { maximumFractionDigits: 1 })} TFLOPS`];
      }).filter(Boolean);
    }

    function formatGpuPerf(gpu) {
      const perf = gpu.precisionTflops || {};
      const items = [
        formatPerfEntry('FP32', perf.fp32),
        formatPerfEntry('TF32', perf.tf32),
        formatPerfEntry('FP16', perf.fp16),
        formatPerfEntry('BF16', perf.bf16),
        formatPerfEntry('FP8', perf.fp8),
        formatPerfEntry('FP4', perf.fp4),
        formatPerfEntry('INT8', perf.int8),
      ].filter(Boolean);
      return items.length ? items.join(' / ') : 'N/A';
    }

    function formatBandwidthEntry(label, entry) {
      const value = Number(entry?.value);
      if (!Number.isFinite(value) || value <= 0) return '';
      return `${label} ${value.toLocaleString(undefined, { maximumFractionDigits: 1 })} ${entry.unit || ''}`.trim();
    }

    function formatBandwidthValue(entry) {
      const value = Number(entry?.value);
      if (!Number.isFinite(value) || value <= 0) return 'N/A';
      return `${value.toLocaleString(undefined, { maximumFractionDigits: 1 })} ${entry.unit || ''}`.trim();
    }

    function formatGpuBandwidth(gpu) {
      const bandwidth = gpu.bandwidthInfo || {};
      const items = [
        formatBandwidthEntry(calculatorLang === 'en' ? 'Internal' : '内部带宽', bandwidth.internal_bandwidth),
        formatBandwidthEntry(calculatorLang === 'en' ? 'Shared' : '互联/共享带宽', bandwidth.shared_bandwidth),
      ].filter(Boolean);
      return items.length ? items.join(' / ') : 'N/A';
    }

    function createInfoItem(label, value) {
      const item = document.createElement('div');
      item.className = 'gpu-info-item';
      const itemLabel = document.createElement('span');
      itemLabel.textContent = label;
      const itemValue = document.createElement('strong');
      itemValue.textContent = value || 'N/A';
      item.append(itemLabel, itemValue);
      return item;
    }

    function getGpuInfoModal() {
      if (gpuInfoModal) return gpuInfoModal;
      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.hidden = true;
      backdrop.id = 'gpuInfoModal';

      const modal = document.createElement('section');
      modal.className = 'modal gpu-info-modal';
      modal.tabIndex = -1;

      const header = document.createElement('div');
      header.className = 'modal-header';
      const titleWrap = document.createElement('div');
      const title = document.createElement('h2');
      title.id = 'gpuInfoTitle';
      const subtitle = document.createElement('p');
      subtitle.className = 'muted';
      subtitle.id = 'gpuInfoSubtitle';
      titleWrap.append(title, subtitle);
      const close = document.createElement('button');
      close.type = 'button';
      close.className = 'modal-close';
      close.setAttribute('aria-label', calculatorLang === 'en' ? 'Close accelerator details' : '\u5173\u95ed\u52a0\u901f\u5361\u8be6\u60c5');
      close.textContent = '\u00d7';
      header.append(titleWrap, close);

      const content = document.createElement('div');
      content.className = 'gpu-info-content';
      modal.append(header, content);
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);

      close.addEventListener('click', closeGpuInfoModal);
      backdrop.addEventListener('click', event => {
        if (event.target === backdrop) closeGpuInfoModal();
      });

      gpuInfoModal = { backdrop, modal, title, subtitle, content, close };
      return gpuInfoModal;
    }

    function closeGpuInfoModal() {
      if (!gpuInfoModal) return;
      gpuInfoModal.backdrop.hidden = true;
    }

    function openGpuInfoModal(inputs, result) {
      const gpu = inputs.gpu;
      const bandwidth = gpu.bandwidthInfo || {};
      const modalState = getGpuInfoModal();
      modalState.title.textContent = gpu.name;
      modalState.subtitle.textContent = '';
      modalState.close.setAttribute('aria-label', calculatorLang === 'en' ? 'Close accelerator details' : '\u5173\u95ed\u52a0\u901f\u5361\u8be6\u60c5');
      modalState.content.innerHTML = '';

      const basics = document.createElement('div');
      basics.className = 'gpu-info-grid';
      basics.append(
        createInfoItem(calculatorLang === 'en' ? 'Vendor' : '\u5382\u5546', gpu.xpuVendor || 'N/A'),
        createInfoItem(calculatorLang === 'en' ? 'Series' : '\u7cfb\u5217', gpu.xpuSeries || 'N/A'),
        createInfoItem(calculatorLang === 'en' ? 'Category' : '\u7c7b\u522b', gpu.category || 'N/A'),
        createInfoItem(calculatorLang === 'en' ? 'Compute capability' : '\u8ba1\u7b97\u80fd\u529b', gpu.computeCapability || 'N/A')
      );

      const resources = document.createElement('div');
      resources.className = 'gpu-info-grid is-resource-row';
      resources.append(
        createInfoItem(calculatorLang === 'en' ? 'Single-card VRAM' : '\u5355\u5361\u663e\u5b58', gpu.vramSource || (gpu.vram + ' GB')),
        createInfoItem('TP', calculatorLang === 'en'
          ? `${result.gpuCount} cards, tensor-parallel shard count`
          : `${result.gpuCount} \u5f20\uff0c\u5f20\u91cf\u5e76\u884c\u62c6\u5206\u5f20\u6570`),
        createInfoItem(calculatorLang === 'en' ? 'Internal bandwidth' : '\u5185\u90e8\u5e26\u5bbd', formatBandwidthValue(bandwidth.internal_bandwidth)),
        createInfoItem(calculatorLang === 'en' ? 'Shared bandwidth' : '\u5171\u4eab\u5e26\u5bbd', formatBandwidthValue(bandwidth.shared_bandwidth))
      );

      const perfSection = document.createElement('div');
      perfSection.className = 'gpu-info-section';
      const perfTitle = document.createElement('h3');

      const utilization = displayResult.requiredGb / totalVram;
      const effectiveUtilization = displayResult.requiredGb / displayResult.totalEffective;
      const canMeet = displayResult.supportedConcurrency >= inputs.concurrency * 0.995;
      const copy = calculatorCopy[calculatorLang];
      result = displayResult;

      els.gpuCount.textContent = deployedGpuCount;
      renderGpuCountHint(inputs, displayResult);

  const linearStateBlock = linearBytes
    ? `
        <div class="formula-section">
          <h3>${detail.linearTitle}</h3>
          <code>linear_state_bytes_per_sequence = linear_attention x (num_heads x feature_dim x value_dim + num_heads x feature_dim) x state_dtype_bytes</code>
          <code>${linearLayers || "-"} x (${linearNumHeads || "-"} x ${linearFeatureDim || "-"} x ${linearValueDim || "-"} + ${linearNumHeads || "-"} x ${linearFeatureDim || "-"}) x ${linearStateBytes || "-"} = ${fmtBytes(model.linearStateBytesPerSequence)}</code>
          <ul class="param-list">
            <li><strong>linear_attention</strong>: ${linearLayers || "-"}</li>
            <li><strong>num_heads</strong>: ${linearNumHeads || "-"}</li>
            <li><strong>feature_dim</strong>: ${linearFeatureDim || "-"}</li>
            <li><strong>value_dim</strong>: ${linearValueDim || "-"}</li>
            <li><strong>state_dtype_bytes</strong>: ${linearStateBytes || "-"}</li>
            <li><strong>linear_state_bytes_per_sequence</strong>: ${fmtBytes(model.linearStateBytesPerSequence)}</li>
            <li><strong>${detail.concurrency}</strong>: ${inputs.concurrency}</li>
          </ul>
          <code>${fmtBytes(model.linearStateBytesPerSequence)} x ${inputs.concurrency} = ${fmtBytes(linearBytes)}, ${detail.approx} ${fmt(linearBytes / 1024 / 1024 / 1024)}</code>
        </div>`
    : `
        <div class="formula-section">
          <h3>${detail.linearEmptyTitle}</h3>
          <code>${detail.linearEmpty}</code>
        </div>`;

  return `
        <div class="formula-section">
          <h3>${detail.weightTitle}</h3>
          <code>${detail.weightFormula}</code>
          <code>${weightStep}</code>
          <ul class="param-list">
            <li><strong>${detail.modelParams}</strong>: ${model.paramCount}; ${detail.weightByTotal} ${fmtModelB(model.totalB)}</li>
            <li><strong>${detail.quantization}</strong>: ${inputs.quant.label}</li>
            <li><strong>${detail.relativeWeight}</strong>: ${detail.approx} ${quantRelativePercent}%</li>
            <li><strong>${detail.activeHint}</strong>: ${fmtModelB(model.activeB)}</li>
          </ul>
        </div>
        <div class="formula-section">
          <h3>${detail.singleTokenTitle}</h3>
          <code>${singleTokenFormula}</code>
          <code>${singleTokenSubstitution}</code>
          <ul class="param-list">
            <li><strong>${detail.mechanism}</strong>: ${model.kv.mechanism}</li>
            <li><strong>cache implementation</strong>: ${model.kv.cacheImplementation || "-"}</li>
            <li><strong>${detail.resultField}</strong>: ${resultField}</li>
            ${singleTokenParamRows}
          </ul>
        </div>
        ${linearStateBlock}
        <div class="formula-section">
          <h3>${detail.requestPoolTitle}</h3>
          <code>${isSliding ? detail.requestPoolSlidingFormula : isNone ? detail.requestPoolNoneFormula : detail.requestPoolFormula}</code>
          ${isSliding ? `<code>min(${inputs.tokensPerRequest}, ${cacheDemand.slidingWindow}) = ${cacheDemand.effectiveSeqTokens}</code>` : ""}
          <code>${isNone ? "0" : `${fmtBytes(runtimeKvPerTokenBytes)} x ${fmtInt(cacheDemand.effectiveResidentTokens)} = ${fmtBytes(tokenKvBytes)}, ${detail.approx} ${fmt(tokenKvBytes / 1024 / 1024 / 1024)}`}</code>
          <ul class="param-list">
            <li><strong>${detail.concurrency}</strong>: ${inputs.concurrency}</li>
            <li><strong>${detail.rawS}</strong>: ${inputs.tokensPerRequest}</li>
            ${isSliding ? `<li><strong>${detail.slidingWindow}</strong>: ${cacheDemand.slidingWindow}</li><li><strong>${detail.effectiveS}</strong>: ${cacheDemand.effectiveSeqTokens}</li>` : `<li><strong>${detail.effectiveS}</strong>: ${cacheDemand.effectiveSeqTokens}</li>`}
            <li><strong>${detail.requestTokenPool}</strong>: ${fmtInt(requestedTokens)} ${detail.rawTokens}</li>
            <li><strong>${detail.residentTokenPool}</strong>: ${fmtInt(cacheDemand.effectiveResidentTokens)} tokens</li>
          </ul>
        </div>
        <div class="formula-section">
          <h3>${detail.totalKvTitle}</h3>
          <code>${detail.docTotalFormula}: ${totalFormula}</code>
          <code>${detail.currentEstimate}</code>
          <code>${fmtBytes(tokenKvBytes)} + ${fmtBytes(linearBytes)} = ${fmtBytes(totalKvBytes)}, ${detail.approx} ${fmt(result.kvTotalGb)}</code>
        </div>
        <div class="formula-section">
          <h3>${detail.frameworkTitle}</h3>
          <code>${detail.frameworkFormula}</code>
          <code>max(${fmt(result.typeReserve.floorGb)}, ${fmt(result.weightTotalGb)} x ${(frameworkRate * 100).toFixed(1)}%) = ${fmt(result.frameworkExtraGb)}</code>
          <ul class="param-list">
            <li><strong>${detail.framework}</strong>: ${inputs.framework.name}</li>
            <li><strong>${detail.modelType}</strong>: ${typeReserveLabel(result.typeReserve)} (${result.typeReserve.kind})</li>
            <li><strong>${detail.baseFloor}</strong>: ${fmt(result.typeReserve.floorGb)}</li>
            <li><strong>${detail.reserveRange}</strong>: ${(result.typeReserve.rateMin * 100).toFixed(1)}% ~ ${(result.typeReserve.rateMax * 100).toFixed(1)}%</li>
            <li><strong>${detail.chosenValue}</strong>: ${detail.useReserveMin} ${(result.typeReserve.rateMin * 100).toFixed(1)}%</li>
            <li><strong>${detail.overheadTotal}</strong>: ${fmt(extraGb)}</li>
          </ul>
          <p class="muted">${detail.frameworkNote}</p>
        </div>
        <div class="formula-section">
          <h3>${detail.demandTitle}</h3>
          <code>${detail.demandFormula}</code>
          <code>${fmt(result.weightTotalGb)} + ${fmt(result.kvTotalGb)} + ${fmt(extraGb)} = ${fmt(result.requiredGb)}</code>
          <ul class="param-list">
            <li><strong>${detail.weights}</strong>: ${fmt(result.weightTotalGb)}</li>
            <li><strong>${detail.kvState}</strong>: ${fmt(result.kvTotalGb)}</li>
            <li><strong>${detail.overhead}</strong>: ${fmt(extraGb)}</li>
            <li><strong>${detail.demand}</strong>: ${fmt(result.requiredGb)}</li>
            <li><strong>${detail.rawVram}</strong>: ${fmt(totalVram)}</li>
            <li><strong>${detail.totalUtilization}</strong>: ${(totalUtilization * 100).toFixed(1)}%</li>
            <li><strong>${detail.concurrencyByKv}</strong>: ${fmtConcurrency(result.supportedConcurrency)}</li>
            <li><strong>${detail.capacityCheck}</strong>: ${canMeet ? detail.targetMet : detail.targetMiss}</li>
          </ul>
        </div>
        <div class="formula-section">
          <h3>${detail.effectiveTitle}</h3>
          <code>${detail.effectiveFormula}</code>
          <code>${result.gpuCount} x ${inputs.gpu.vram} GB x (1 - ${inputs.reserveRatio.toFixed(2)}) = ${fmt(result.totalEffective)}</code>
          <code>${fmt(result.requiredGb)} / (${result.gpuCount} x ${inputs.gpu.vram} GB x (1 - ${inputs.reserveRatio.toFixed(2)})) = ${(effectiveUtilization * 100).toFixed(1)}%</code>
          <ul class="param-list">
            <li><strong>${detail.runtimeReserve}</strong>: ${Math.round(inputs.reserveRatio * 100)}%</li>
            <li><strong>${detail.effectivePerGpu}</strong>: ${fmt(result.effectivePerGpu)} / ${inputs.gpu.vram} GB</li>
            <li><strong>${detail.totalEffective}</strong>: ${fmt(result.totalEffective)}</li>
          </ul>
        </div>
        <div class="formula-section">
          <h3>${detail.sourcesTitle}</h3>
          <ul class="param-list">
            <li><strong>${detail.modelConfig}</strong>: ${model.name}</li>
            <li><strong>${detail.modelFields}</strong>: ${detail.modelFieldsValue}</li>
            <li><strong>${detail.kvFormulaDoc}</strong>: KV_cache显存计算说明.md</li>
            <li><strong>${detail.frameworkDoc}</strong>: vllm框架额外预留.md</li>
            <li><strong>${detail.modelBasis}</strong>: ${modelBasis}</li>
            <li><strong>${detail.gpuTable}</strong>: ${detail.gpuTableValue}</li>
            <li><strong>${detail.gpuBasis}</strong>: ${gpuBasis}</li>
          </ul>
          <p class="muted">${model.description || ""}</p>
          <p class="muted">${sourceLinks}</p>
        </div>
      `;
}

    function getFormulaIntro(title) {
      const en = calculatorLang === 'en';
      if (title.includes('模型权重') || title.includes('Model Weights')) return en ? 'Calculates model weight memory under the selected quantization profile.' : '计算模型参数在当前量化策略下占用的权重显存。';
      if (title.includes('单 token') || title.includes('per-token')) return en ? 'Calculates the KV Cache bytes retained for each token.' : '计算每个 token 需要保留的 KV Cache 字节数。';
      if (title.includes('Linear Attention')) return en ? 'Calculates per-sequence extra memory for Linear Attention or extended State.' : '计算 Linear Attention 或扩展 State 的单序列额外显存。';
      if (title.includes('请求 token 池') || title.includes('request token pool')) return en ? 'Calculates the KV token pool formed by target concurrency and context length.' : '计算目标并发和上下文长度共同形成的 KV token 池。';
      if (title.includes('总消耗') || title.includes('total consumption')) return en ? 'Sums token KV and extended State into total KV Cache memory.' : '汇总 token KV 与扩展 State，得到 KV Cache 总显存。';
      if (title.includes('框架开销') || title.includes('Framework overhead')) return en ? 'Calculates the base runtime memory reserve required by framework and model type.' : '计算推理框架和模型类型需要预留的基础运行显存。';
      if (title.includes('总需求') || title.includes('Total demand')) return en ? 'Sums weights, KV/State, and framework overhead to check total memory demand.' : '汇总权重、KV/State 和框架开销，判断整体显存需求。';
      if (title.includes('有效容量') || title.includes('Effective capacity')) return en ? 'Calculates utilization against capacity after runtime reserve is deducted.' : '用扣除预留后的有效容量计算当前方案的利用率。';
      return en ? 'Explains the calculation scope and key fields for this memory item.' : '说明这一项显存的计算口径和关键字段。';
    }

    function getResultIntro(title, index, total) {
      const en = calculatorLang === 'en';
      if ((title.includes('请求 token 池') || title.includes('request token pool')) && total > 1 && index === 0) return en ? 'First determine the effective context length used for KV residency.' : '先确定参与 KV 驻留计算的有效上下文长度。';
      if ((title.includes('有效容量') || title.includes('Effective capacity')) && total > 1 && index === 0) return en ? 'First calculate effective memory available with the current accelerator count.' : '先计算当前加速卡数量下可用于模型的有效显存容量。';
      if ((title.includes('总消耗') || title.includes('total consumption')) && index === total - 1) return en ? 'Then sum token KV and extended State to get the final memory for this item.' : '再汇总 token KV 与扩展 State，得到本项最终显存。';
      if (title.includes('Linear Attention') && index === total - 1) return en ? 'Then multiply by concurrency to get total extended State memory.' : '再乘以并发数，得到扩展 State 的总显存。';
      if (total > 1 && index === total - 1) return en ? 'Finally produce the summary result for this item.' : '最后得到当前项的汇总结果。';
      return en ? 'Substitute the current inputs into the formula to get an intermediate value or result.' : '将当前输入代入公式，得到中间值或本项结果。';
    }

    function createFormulaStep(labelText, descText) {
      const step = document.createElement('div');
      step.className = 'formula-step';

      const label = document.createElement('div');
      label.className = 'formula-step-label';
      label.textContent = labelText;

      const desc = document.createElement('p');
      desc.className = 'formula-step-desc';
      desc.textContent = descText;

      step.append(label, desc);
      return step;
    }

    function enhanceDetailSections() {
      els.detailContent.querySelectorAll('.formula-section').forEach(section => {
        const codeBlocks = Array.from(section.children).filter(child => child.tagName === 'CODE');
        if (codeBlocks.length) {
          const title = section.querySelector('h3')?.textContent || '';
          const steps = document.createElement('div');
          steps.className = 'formula-steps';
          section.insertBefore(steps, codeBlocks[0]);

          const formulaStep = createFormulaStep(calculatorLang === 'en' ? 'Formula' : '公式说明', getFormulaIntro(title));
          formulaStep.appendChild(codeBlocks[0]);
          steps.appendChild(formulaStep);

          if (codeBlocks.length > 1) {
            const resultStep = createFormulaStep(
              calculatorLang === 'en' ? 'Substitution / result' : '代入值 / 计算结果',
              calculatorLang === 'en' ? 'Shows substitutions in input order, including intermediate values and final result when needed.' : '按当前输入顺序展示代入过程，必要时包含中间值和最终结果。'
            );
            const resultBlocks = codeBlocks.slice(1);
            resultBlocks.forEach((code, index) => {
              const note = document.createElement('div');
              note.className = 'calc-note';
              note.textContent = getResultIntro(title, index, resultBlocks.length);
              resultStep.append(note, code);
            });
            steps.appendChild(resultStep);
          }
        }

        const paramList = section.querySelector(':scope > .param-list');
        if (paramList) {
          const intro = document.createElement('p');
          intro.className = 'param-list-intro';
          intro.textContent = calculatorLang === 'en'
            ? 'Parameters used to validate the formula above, including key inputs and source fields for this calculation.'
            : '参数值用于校验上方公式，展示当前计算使用的关键输入和来源字段。';
          section.insertBefore(intro, paramList);
        }
      });
    }

    function openDetailModal() {
      if (!currentInputs || !currentResult) return;
      lastFocusedElement = document.activeElement;
      els.detailSubtitle.textContent = `${currentInputs.framework.name} · ${currentInputs.model.name} · ${currentInputs.gpu.name}`;
      els.detailContent.innerHTML = buildDetailHtml(currentInputs, currentResult);
      enhanceDetailSections();
      els.detailModal.hidden = false;
      els.detailDialog.focus();
    }

    function closeDetailModal() {
      els.detailModal.hidden = true;
      if (lastFocusedElement && typeof lastFocusedElement.focus === 'function') lastFocusedElement.focus();
    }

    function openDisclaimerModal() {
      lastFocusedElement = document.activeElement;
      els.disclaimerModal.hidden = false;
      els.disclaimerDialog.focus();
    }

    function closeDisclaimerModal() {
      els.disclaimerModal.hidden = true;
      if (lastFocusedElement && typeof lastFocusedElement.focus === 'function') lastFocusedElement.focus();
    }

    function resetDefaults() {
      els.framework.value = 'vllm';
      els.model.value = 'Qwen2.5-32B-Instruct';
      els.quant.value = 'none';
      els.gpu.value = 'NVIDIA H100';
      els.concurrency.value = 64;
      els.reserve.value = 15;
      syncModelPicker();
      syncGpuPicker();
      syncContextTokensToModel();
      els.kvDtype.value = 2;
      calculate();
    }

    initSelects();
    initSearchableSelects();
    els.form.addEventListener('submit', event => {
      event.preventDefault();
      calculate();
    });
    els.model.addEventListener('input', () => {
      syncModelPicker();
      syncContextTokensToModel();
      calculate();
    });
    els.gpu.addEventListener('input', () => {
      syncGpuPicker();
      syncQuantAvailability();
      syncKvDtypeAvailability();
      calculate();
    });
    Object.values(els).forEach(el => {
      if (el && el !== els.model && el !== els.gpu && ['SELECT', 'INPUT'].includes(el.tagName)) el.addEventListener('input', calculate);
    });
    els.resetBtn.addEventListener('click', resetDefaults);
    els.detailBtn.addEventListener('click', openDetailModal);
    els.closeDetailBtn.addEventListener('click', closeDetailModal);
    els.disclaimerBtn.addEventListener('click', openDisclaimerModal);
    els.closeDisclaimerBtn.addEventListener('click', closeDisclaimerModal);
    els.modelPickerTrigger.addEventListener('click', toggleModelPicker);
    els.gpuPickerTrigger.addEventListener('click', toggleGpuPicker);
    els.modelPickerSearch.addEventListener('input', () => filterPickerOptions(els.modelPickerOptions, els.modelPickerSearch, els.modelPickerEmpty));
    els.modelPickerSearch.addEventListener('click', event => event.stopPropagation());
    els.gpuPickerSearch.addEventListener('input', () => filterPickerOptions(els.gpuPickerOptions, els.gpuPickerSearch, els.gpuPickerEmpty));
    els.gpuPickerSearch.addEventListener('click', event => event.stopPropagation());
    document.addEventListener('click', event => {
      if (els.modelPicker && !els.modelPicker.contains(event.target)) closeModelPicker();
      if (els.gpuPicker && !els.gpuPicker.contains(event.target)) closeGpuPicker();
      if (!event.target.closest?.('.searchable-select')) closeSearchableSelects();
    });
    els.detailModal.addEventListener('click', event => {
      if (event.target === els.detailModal) closeDetailModal();
    });
    els.disclaimerModal.addEventListener('click', event => {
      if (event.target === els.disclaimerModal) closeDisclaimerModal();
    });
    document.addEventListener('keydown', event => {
      if (event.key !== 'Escape') return;
      closeModelPicker();
      closeGpuPicker();
      closeSearchableSelects();
      if (!els.detailModal.hidden) closeDetailModal();
      if (!els.disclaimerModal.hidden) closeDisclaimerModal();
      closeGpuInfoModal();
    });
    applyCalculatorLanguage();
    calculate();
  
</script>
</body>
</html>
